<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>\u0418\u0441\u0442\u043e\u0440\u0438\u044f \u2014 The Pact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111a1e;
      color: #e8ecee;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== HEADER ===== */
    .page-header {
      background: #182630;
      border-bottom: 1px solid #1e3040;
      padding: 14px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      border: 1px solid #1e3040;
      border-radius: 8px;
      background: #1e3040;
      color: #8fa3b0;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      text-decoration: none;
      transition: all 150ms;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .back-btn:hover { background: #243848; color: #e8ecee; border-color: #2c4858; }

    .header-meta { flex: 1; min-width: 0; }
    .header-subtitle {
      font-size: 10px;
      color: #566d7a;
      margin-bottom: 3px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 500;
    }
    .header-title {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }
    .header-breadcrumb {
      font-size: 12px;
      color: #566d7a;
      margin-top: 3px;
    }
    .header-breadcrumb span { color: #8fa3b0; }

    /* ===== CONTENT ===== */
    .content {
      max-width: 780px;
      margin: 0 auto;
      padding: 36px 24px 60px;
    }

    .history-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid #1e3040;
    }
    .history-title { font-size: 17px; font-weight: 700; color: #e8ecee; }
    .history-count {
      font-size: 12px;
      color: #566d7a;
      background: #1e3040;
      padding: 2px 10px;
      border-radius: 9999px;
    }

    /* ===== ROWS ===== */
    .history-list { display: flex; flex-direction: column; }

    .history-row {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 16px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .history-row:last-child { border-bottom: none; }

    .history-icon-wrap {
      width: 38px;
      height: 38px;
      background: #1e3040;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }

    .history-body { flex: 1; min-width: 0; }
    .history-text {
      font-size: 14.5px;
      line-height: 1.65;
      color: #e8ecee;
    }
    .history-text b { color: #1cb0f6; font-weight: 600; }
    .history-text em { color: #8fa3b0; font-style: normal; }
    .history-time {
      font-size: 12px;
      color: #566d7a;
      margin-top: 5px;
    }

    /* ===== STATES ===== */
    .history-empty, .history-loading {
      text-align: center;
      padding: 70px 20px;
      color: #566d7a;
      font-size: 14px;
    }
    .error-msg {
      text-align: center;
      padding: 70px 20px;
      color: #ef4444;
      font-size: 14px;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a3f4d; border-radius: 3px; }
  </style>
</head>
<body>

<div class="page-header">
  <button class="back-btn" onclick="window.close()">&#8592; \u0417\u0430\u0442\u0432\u043e\u0440\u0438</button>
  <div class="header-meta">
    <div class="header-subtitle">&#128336; \u0418\u0441\u0442\u043e\u0440\u0438\u044f \u043d\u0430 \u043f\u0440\u043e\u043c\u0435\u043d\u0438\u0442\u0435</div>
    <div class="header-title" id="cardTitle">\u0417\u0430\u0440\u0435\u0436\u0434\u0430\u043d\u0435\u2026</div>
    <div class="header-breadcrumb" id="cardBreadcrumb"></div>
  </div>
</div>

<div class="content">
  <div id="historyList"><div class="history-loading">\u0417\u0430\u0440\u0435\u0436\u0434\u0430\u043d\u0435\u2026</div></div>
</div>

<script>
(function() {
  var prioLabels = { normal: '\u041d\u043e\u0440\u043c\u0430\u043b\u0435\u043d', high: '\u0412\u0438\u0441\u043e\u043a', urgent: '\u0421\u043f\u0435\u0448\u043d\u043e' };
  var dateFldLabels = {
    publish_date: '\u041f\u0443\u0431\u043b\u0438\u043a\u0443\u0432\u0430\u043d\u0435',
    upload_date: '\u041a\u0430\u0447\u0432\u0430\u043d\u0435',
    editing_date: '\u041c\u043e\u043d\u0442\u0430\u0436',
    filming_date: '\u0417\u0430\u0441\u043d\u0435\u043c\u0430\u043d\u0435',
    brainstorm_date: '\u0418\u0437\u043c\u0438\u0441\u043b\u044f\u043d\u0435'
  };

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function fmtD(v) {
    if (!v) return '\u2014';
    var s = String(v).split('T')[0];
    var p = s.split('-');
    return p.length === 3 ? p[2]+'.'+p[1]+'.'+p[0] : s;
  }

  function fmtTs(ts) {
    var d = new Date(ts);
    var day = String(d.getDate()).padStart(2,'0');
    var mon = String(d.getMonth()+1).padStart(2,'0');
    var hrs = String(d.getHours()).padStart(2,'0');
    var min = String(d.getMinutes()).padStart(2,'0');
    var weekDays = ['\u041d\u0435\u0434','\u041f\u043e\u043d','\u0412\u0442','\u0421\u0440','\u0427\u0435\u0442','\u041f\u0435\u0442','\u0421\u044a\u0431'];
    return weekDays[d.getDay()] + ', ' + day+'.'+mon+'.'+d.getFullYear()+' \u0432 '+hrs+':'+min;
  }

  function buildRow(r) {
    var icon = '', text = '';
    var userName = esc(r.user_name || '\u2014');
    var meta = (r.source === 'event' && r.metadata)
      ? (typeof r.metadata === 'string' ? JSON.parse(r.metadata) : r.metadata)
      : {};

    if (r.source === 'date_change') {
      icon = '\ud83d\udcc5';
      var lbl = dateFldLabels[r.field_name] || r.field_name;
      text = '<b>'+userName+'</b> \u043f\u0440\u043e\u043c\u0435\u043d\u0438 <em>'+esc(lbl)+'</em>: '+fmtD(r.old_value)+' \u2192 '+fmtD(r.new_value);
    } else if (r.event_type === 'created') {
      icon = '\ud83d\udfe2';
      text = '<b>'+userName+'</b> \u0441\u044a\u0437\u0434\u0430\u0434\u0435 \u043a\u0430\u0440\u0442\u0430\u0442\u0430';
    } else if (r.event_type === 'moved') {
      icon = '\u2197\ufe0f';
      var fromC = esc(r.from_col_title || '\u2014'), toC = esc(r.to_col_title || '\u2014');
      text = '<b>'+userName+'</b> \u043f\u0440\u0435\u043c\u0435\u0441\u0442\u0438: <em>'+fromC+'</em> \u2192 <em>'+toC+'</em>';
    } else if (r.event_type === 'field_changed') {
      var uName = esc(meta.user_name || r.user_name || '\u2014');
      var f = meta.field || '', ov2 = meta.old_value, nv2 = meta.new_value;
      if (f === 'title') {
        icon = '\u270f\ufe0f';
        text = '<b>'+uName+'</b> \u043f\u0440\u043e\u043c\u0435\u043d\u0438 \u0437\u0430\u0433\u043b\u0430\u0432\u0438\u0435\u0442\u043e: <em>'+esc(String(ov2||'\u2014'))+'</em> \u2192 <em>'+esc(String(nv2||'\u2014'))+'</em>';
      } else if (f === 'priority') {
        icon = '\u26a1';
        text = '<b>'+uName+'</b> \u043f\u0440\u043e\u043c\u0435\u043d\u0438 \u043f\u0440\u0438\u043e\u0440\u0438\u0442\u0435\u0442\u0430: <em>'+(prioLabels[ov2]||ov2||'\u2014')+'</em> \u2192 <em>'+(prioLabels[nv2]||nv2||'\u2014')+'</em>';
      } else if (f === 'is_on_hold') {
        icon = nv2 ? '\u23f8' : '\u25b6\ufe0f';
        text = '<b>'+uName+'</b> '+(nv2 ? '\u043f\u043e\u0441\u0442\u0430\u0432\u0438 \u043d\u0430 \u0438\u0437\u0447\u0430\u043a\u0432\u0430\u043d\u0435' : '\u0441\u0432\u0430\u043b\u0438 \u043e\u0442 \u0438\u0437\u0447\u0430\u043a\u0432\u0430\u043d\u0435');
      } else if (f === 'due_on') {
        icon = '\ud83d\udcc5';
        text = '<b>'+uName+'</b> \u043f\u0440\u043e\u043c\u0435\u043d\u0438 \u043a\u0440\u0430\u0435\u043d \u0441\u0440\u043e\u043a: <em>'+fmtD(ov2)+'</em> \u2192 <em>'+fmtD(nv2)+'</em>';
      } else {
        icon = '\ud83d\udcdd';
        text = '<b>'+uName+'</b> \u043f\u0440\u043e\u043c\u0435\u043d\u0438 '+esc(f);
      }
    } else if (r.event_type === 'assignee_added') {
      icon = '\ud83d\udc64';
      text = '<b>'+esc(meta.user_name||userName)+'</b> \u0434\u043e\u0431\u0430\u0432\u0438 \u043e\u0442\u0433\u043e\u0432\u043e\u0440\u043d\u0438\u043a: <b>'+esc(meta.assignee_name||'')+'</b>';
    } else if (r.event_type === 'assignee_removed') {
      icon = '\ud83d\udc64';
      text = '<b>'+esc(meta.user_name||userName)+'</b> \u043f\u0440\u0435\u043c\u0430\u0445\u043d\u0430 \u043e\u0442\u0433\u043e\u0432\u043e\u0440\u043d\u0438\u043a: <b>'+esc(meta.assignee_name||'')+'</b>';
    } else if (r.event_type === 'archived') {
      icon = '\ud83d\udce6';
      text = '<b>'+userName+'</b> \u0430\u0440\u0445\u0438\u0432\u0438\u0440\u0430 \u043a\u0430\u0440\u0442\u0430\u0442\u0430';
    } else {
      icon = '\ud83d\udcdd';
      text = '<b>'+userName+'</b> '+esc(r.event_type||'');
    }

    return '<div class="history-row">' +
      '<div class="history-icon-wrap">'+icon+'</div>' +
      '<div class="history-body">' +
        '<div class="history-text">'+text+'</div>' +
        '<div class="history-time">'+fmtTs(r.ts)+'</div>' +
      '</div>' +
    '</div>';
  }

  // Extract card ID from path: /card-history/123
  var pathParts = window.location.pathname.split('/');
  var cardId = parseInt(pathParts[pathParts.length - 1], 10);

  var titleEl = document.getElementById('cardTitle');
  var breadEl = document.getElementById('cardBreadcrumb');
  var listEl  = document.getElementById('historyList');

  if (!cardId || isNaN(cardId)) {
    titleEl.textContent = '\u0413\u0440\u0435\u0448\u043a\u0430';
    listEl.innerHTML = '<div class="error-msg">\u041d\u0435\u0432\u0430\u043b\u0438\u0434\u0435\u043d ID \u043d\u0430 \u043a\u0430\u0440\u0442\u0430.</div>';
    return;
  }

  Promise.all([
    fetch('/api/cards/'+cardId).then(function(r) { return r.ok ? r.json() : null; }),
    fetch('/api/cards/'+cardId+'/history').then(function(r) { return r.ok ? r.json() : []; })
  ]).then(function(results) {
    var card = results[0];
    var rows = results[1];

    if (card && card.title) {
      titleEl.textContent = card.title;
      document.title = card.title + ' \u2014 \u0418\u0441\u0442\u043e\u0440\u0438\u044f \u2014 The Pact';
      if (card.board_title || card.column_title) {
        breadEl.innerHTML =
          (card.board_title ? '<span>'+esc(card.board_title)+'</span>' : '') +
          (card.column_title ? ' &rsaquo; <span>'+esc(card.column_title)+'</span>' : '');
      }
    } else {
      titleEl.textContent = '\u041a\u0430\u0440\u0442\u0430 #'+cardId;
    }

    if (!rows || !rows.length) {
      listEl.innerHTML = '<div class="history-empty">\u041d\u044f\u043c\u0430 \u0437\u0430\u043f\u0438\u0441\u0430\u043d\u0438 \u043f\u0440\u043e\u043c\u0435\u043d\u0438 \u0437\u0430 \u0442\u0430\u0437\u0438 \u043a\u0430\u0440\u0442\u0430.</div>';
      return;
    }

    var html = '<div class="history-header">' +
      '<span class="history-title">\u0410\u043a\u0442\u0438\u0432\u043d\u043e\u0441\u0442</span>' +
      '<span class="history-count">'+rows.length+' \u0437\u0430\u043f\u0438\u0441\u0430</span>' +
      '</div>' +
      '<div class="history-list">';
    rows.forEach(function(r) { html += buildRow(r); });
    html += '</div>';
    listEl.innerHTML = html;

  }).catch(function() {
    titleEl.textContent = '\u0413\u0440\u0435\u0448\u043a\u0430';
    listEl.innerHTML = '<div class="error-msg">\u0413\u0440\u0435\u0448\u043a\u0430 \u043f\u0440\u0438 \u0437\u0430\u0440\u0435\u0436\u0434\u0430\u043d\u0435 \u043d\u0430 \u0438\u0441\u0442\u043e\u0440\u0438\u044f\u0442\u0430.</div>';
  });
})();
</script>
</body>
</html>
