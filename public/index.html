<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#09090b">
  <meta name="color-scheme" content="dark">
  <title>The Pact</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/board.css">
</head>
<body>
  <!-- Top Navigation Bar (Basecamp style) -->
  <header class="top-nav" id="topNav">
    <div class="top-nav-left">
      <a href="#/home" class="top-nav-logo">
        <span class="top-nav-logo-dot"></span>
        <span>The Pact</span>
      </a>
    </div>
    <nav class="top-nav-center">
      <a href="#/home" class="top-nav-item" data-tnav="home">🏠 Home</a>
      <a href="#/activity" class="top-nav-item" data-tnav="activity">📋 Activity</a>
      <a href="#/mystuff" class="top-nav-item" data-tnav="mystuff">📌 My Stuff</a>
      <a href="#/find" class="top-nav-item" data-tnav="find">🔍 Find</a>
      <a href="#/chat" class="top-nav-item" data-tnav="chat">💬 Чат</a>
    </nav>
    <div class="top-nav-right">
      <a href="#/notifications" class="top-nav-icon" title="Известия" data-tnav="notifications">
        🔔 <span class="notif-badge" id="notifBadge" style="display:none">0</span>
      </a>
      <div class="top-nav-status">
        <span class="status-dot" id="wsStatusDot"></span>
        <span id="wsStatus"></span>
      </div>
      <div class="top-nav-user" onclick="openProfile()" title="Профил">
        <div class="user-avatar-sm" id="topNavAvatar"></div>
      </div>
    </div>
  </header>

  <!-- Breadcrumb -->
  <div class="breadcrumb-bar" id="breadcrumbBar" style="display:none">
    <div class="breadcrumb" id="breadcrumb"></div>
  </div>

  <!-- Main Content -->
  <main class="main-area" id="mainArea">
    <div id="pageContent">
      <div class="empty-state">Зареждане...</div>
    </div>
  </main>

  <!-- Profile Modal -->
  <div id="profileModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;display:none;justify-content:center;align-items:center;backdrop-filter:blur(4px)">
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px;width:420px;max-width:90vw;position:relative">
      <button onclick="closeProfile()" style="position:absolute;top:12px;right:12px;background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer">&times;</button>
      <h2 style="font-size:18px;font-weight:600;color:#fff;margin-bottom:24px">Профил</h2>
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px">
        <div id="profileAvatar" style="width:64px;height:64px;border-radius:50%;background:var(--bg-hover);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:600;color:var(--accent);border:2px solid var(--border);overflow:hidden;cursor:pointer" onclick="document.getElementById('avatarInput').click()"></div>
        <div>
          <div id="profileName" style="font-size:16px;font-weight:600;color:#fff"></div>
          <div id="profileEmail" style="font-size:13px;color:var(--text-dim)"></div>
          <div id="profileRole" style="margin-top:4px"></div>
        </div>
        <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="uploadAvatar(this)">
      </div>
      <div class="divider"></div>
      <div style="margin-top:16px">
        <label style="font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:6px">Име</label>
        <div style="display:flex;gap:8px">
          <input id="profileNameInput" style="flex:1" placeholder="Име и фамилия">
          <button class="btn btn-primary btn-sm" onclick="saveProfileName()">Запази</button>
        </div>
      </div>
      <div class="divider"></div>
      <div style="margin-top:16px">
        <label style="font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:6px">Смяна на парола</label>
        <input id="currentPwd" type="password" placeholder="Текуща парола" style="width:100%;margin-bottom:8px">
        <input id="newPwd" type="password" placeholder="Нова парола (мин. 8 символа)" style="width:100%;margin-bottom:8px">
        <button class="btn btn-sm" onclick="changePassword()">Смени парола</button>
        <span id="pwdMsg" style="font-size:12px;margin-left:8px"></span>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
