<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#09090b">
  <meta name="color-scheme" content="dark">
  <title>The Pact</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/board.css">
  <link rel="stylesheet" type="text/css" href="https://unpkg.com/trix@2.1.8/dist/trix.css">
  <script type="text/javascript" src="https://unpkg.com/trix@2.1.8/dist/trix.umd.min.js"></script>
</head>
<body>
  <!-- Top Navigation Bar -->
  <div class="nav">
    <nav class="nav__bar">
      <a href="#/home" class="nav__logo">
        <span class="nav__logo-dot"></span>
        <span>The Pact</span>
      </a>

      <ul class="nav__main">
        <li class="nav__item">
          <a class="nav__link" href="#/home" data-nav="home">
            <svg viewBox="0 0 24 24" width="16" height="16"><path d="M3 12l9-9 9 9M5 10v10a1 1 0 001 1h3a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1h3a1 1 0 001-1V10" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>Home</span>
          </a>
        </li>
        <li class="nav__item">
          <a class="nav__link" href="#/activity" data-nav="activity">
            <svg viewBox="0 0 24 24" width="16" height="16"><circle cx="12" cy="12" r="10" stroke="currentColor" fill="none" stroke-width="2"/><path d="M12 6v6l4 2" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round"/></svg>
            <span>Activity</span>
          </a>
        </li>
        <li class="nav__item">
          <button class="nav__link" data-nav="pings" onclick="location.hash='#/chat'">
            <svg viewBox="0 0 24 24" width="16" height="16"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2v10z" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>Pings</span>
          </button>
        </li>
        <li class="nav__item">
          <button class="nav__link" data-nav="hey" onclick="toggleDropdown('heyDropdown', this)">
            <svg viewBox="0 0 24 24" width="16" height="16"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>Hey!</span>
            <span class="unread-badge" id="heyBadge" style="display:none">0</span>
          </button>
          <div class="nav-dropdown nav-dropdown--center nav-dropdown--medium" id="heyDropdown"></div>
        </li>
        <li class="nav__item">
          <button class="nav__link" data-nav="mystuff" onclick="toggleDropdown('myStuffDropdown', this)">
            <svg viewBox="0 0 24 24" width="16" height="16"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 3a4 4 0 100 8 4 4 0 000-8z" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>My Stuff</span>
          </button>
          <div class="nav-dropdown nav-dropdown--center nav-dropdown--small" id="myStuffDropdown"></div>
        </li>
        <li class="nav__item">
          <button class="nav__link" data-nav="find" onclick="toggleDropdown('findDropdown', this)">
            <svg viewBox="0 0 24 24" width="16" height="16"><circle cx="11" cy="11" r="8" stroke="currentColor" fill="none" stroke-width="2"/><path d="M21 21l-4.35-4.35" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round"/></svg>
            <span>Find</span>
          </button>
          <div class="nav-dropdown nav-dropdown--center nav-dropdown--large" id="findDropdown"></div>
        </li>
      </ul>

      <div class="nav__me">
        <div class="nav__ws-status">
          <span class="status-dot" id="wsStatusDot"></span>
          <span id="wsStatus"></span>
        </div>
        <div class="nav__avatar" id="navAvatar" onclick="openProfile()"></div>
      </div>
    </nav>
  </div>

  <!-- Breadcrumb Bar -->
  <div class="breadcrumb-bar hidden" id="breadcrumbBar">
    <div class="breadcrumb" id="breadcrumb"></div>
  </div>

  <!-- Main Content -->
  <main class="main-area" id="mainArea">
    <div id="pageContent">
      <div style="text-align:center;padding:60px;color:var(--text-dim)">Зареждане...</div>
    </div>
  </main>

  <!-- Profile Modal -->
  <div id="profileModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;justify-content:center;align-items:center;backdrop-filter:blur(4px)">
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:32px;width:420px;max-width:90vw;position:relative">
      <button onclick="closeProfile()" style="position:absolute;top:12px;right:12px;background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer">&times;</button>
      <h2 style="font-size:18px;font-weight:600;color:#fff;margin-bottom:24px">Профил</h2>
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px">
        <div id="profileAvatar" style="width:64px;height:64px;border-radius:50%;background:var(--bg-hover);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:600;color:var(--accent);border:2px solid var(--border);overflow:hidden;cursor:pointer" onclick="document.getElementById('avatarInput').click()"></div>
        <div>
          <div id="profileName" style="font-size:16px;font-weight:600;color:#fff"></div>
          <div id="profileEmail" style="font-size:13px;color:var(--text-dim)"></div>
          <div id="profileRole" style="margin-top:4px"></div>
        </div>
        <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="uploadAvatar(this)">
      </div>
      <div class="divider"></div>
      <div style="margin-top:16px">
        <label style="font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:6px">Име</label>
        <div style="display:flex;gap:8px">
          <input id="profileNameInput" style="flex:1" placeholder="Име и фамилия">
          <button class="btn btn-primary btn-sm" onclick="saveProfileName()">Запази</button>
        </div>
      </div>
      <div class="divider"></div>
      <div style="margin-top:16px">
        <label style="font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:6px">Смяна на парола</label>
        <input id="currentPwd" type="password" placeholder="Текуща парола" style="width:100%;margin-bottom:8px">
        <input id="newPwd" type="password" placeholder="Нова парола" style="width:100%;margin-bottom:8px">
        <button class="btn btn-sm" onclick="changePassword()">Смени парола</button>
        <span id="pwdMsg" style="font-size:12px;margin-left:8px"></span>
      </div>
      <div class="divider"></div>
      <div style="margin-top:16px;text-align:center">
        <button class="btn btn-sm" onclick="logout()" style="color:var(--red)">Изход от акаунта</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
