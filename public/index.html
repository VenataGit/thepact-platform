<html lang="bg">

  <meta name="theme-color" content="#1a2730">
  <meta name="color-scheme" content="dark">
  <title>The Pact</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="/css/card-detail.css">

  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="stylesheet" href="/css/production-calendar.css">
  <link rel="stylesheet" href="/css/vault-docs.css">
  <link rel="stylesheet" href="/css/admin-theme.css">
  <link rel="stylesheet" href="/css/modals-toasts.css">
  <link rel="stylesheet" href="/css/board-responsive.css">
  <!-- Theme bootstrap (FOUC guard): synchronously inject cached theme overrides
       before <body> renders, so users don't see the default theme flash on reload.
       The cache is populated by applyThemeColors() in theme-admin.js on every save.
       'thepact-theme-cv' is a cache version — bump it to invalidate stale caches
       on all users after a change in how applyThemeColors() generates CSS. -->
  <script>
    (function() {
      var CACHE_VERSION = '2';
      try {
        var stored = localStorage.getItem('thepact-theme-cv');
        if (stored !== CACHE_VERSION) {
          localStorage.removeItem('thepact-theme-css');
          localStorage.setItem('thepact-theme-cv', CACHE_VERSION);
        }
        var css = localStorage.getItem('thepact-theme-css');
        if (css) {
          var s = document.createElement('style');
          s.id = 'themeOverrides';
          s.textContent = css;
          document.head.appendChild(s);
        }
      } catch (e) { /* private mode / disabled storage — fall back to default */ }
    })();
  </script>
  <!-- Trix editor: loaded async, only needed for card editing -->
  <link rel="stylesheet" href="https://unpkg.com/trix@2.1.8/dist/trix.css" media="print" onload="this.media='all'">
  <script src="https://unpkg.com/trix@2.1.8/dist/trix.umd.min.js" defer></script>
</head>
<body>
  <!-- Top Navigation Bar -->
  <div class="nav">
    <nav class="nav__bar">
      <a href="#/home" class="nav__logo">
        <img src="/img/logo-white.svg" alt="The Pact" class="nav__logo-img">
      </a>

      <ul class="nav__main">
        <li class="nav__item">
          <a class="nav__link" href="#/home" data-nav="home">
            <img src="/img/icon-home.png" alt="" width="16" height="16" class="nav__icon">
            <span>Home</span>
          </a>
        </li>
        <li class="nav__item">
          <a class="nav__link" href="#/dashboard" data-nav="dashboard">
            <img src="/img/icon-dashboard.png" alt="" width="16" height="16" class="nav__icon">
            <span>Dashboard</span>
          </a>
        </li>
        <li class="nav__item">
          <a class="nav__link" href="#/calendar" data-nav="calendar">
            <img src="/img/icon-calendar.png" alt="" width="16" height="16" class="nav__icon">
            <span>Production Calendar</span>
          </a>
        </li>
        <li class="nav__item">
          <button class="nav__link" data-nav="pings" onclick="toggleDropdown('pingsDropdown', this, event)">
            <img src="/img/icon-ping.png" alt="" width="16" height="16" class="nav__icon">
            <span>Pings</span>
            <span class="unread-badge" id="pingsBadge" style="display:none">0</span>
          </button>
          <div class="nav-dropdown nav-dropdown--center nav-dropdown--pings" id="pingsDropdown"></div>
        </li>
        <li class="nav__item">
          <button class="nav__link" data-nav="hey" onclick="toggleDropdown('heyDropdown', this, event)">
            <img src="/img/icon-hey.png" alt="" width="16" height="16" class="nav__icon">
            <span>Hey!</span>
            <span class="unread-badge" id="heyBadge" style="display:none">0</span>
          </button>
          <div class="nav-dropdown nav-dropdown--center nav-dropdown--hey" id="heyDropdown"></div>
        </li>
        <li class="nav__item">
          <button class="nav__link" data-nav="find" onclick="toggleDropdown('findDropdown', this, event)">
            <img src="/img/icon-search.png" alt="" width="16" height="16" class="nav__icon">
            <span>Find</span>
          </button>
          <div class="nav-dropdown nav-dropdown--center nav-dropdown--large" id="findDropdown"></div>
        </li>
        <li class="nav__item">
          <button class="nav__link" data-nav="more" onclick="toggleDropdown('moreDropdown', this, event)">
            <img src="/img/icon-tools.png" alt="" width="16" height="16" class="nav__icon">
            <span>More</span>
          </button>
          <div class="nav-dropdown nav-dropdown--center nav-dropdown--small" id="moreDropdown"></div>
        </li>
      </ul>

      <div class="nav__me">
        <div class="nav__ws-status">
          <span class="status-dot" id="wsStatusDot"></span>
          <span id="wsStatus"></span>
        </div>
        <button class="sos-nav-btn" onclick="openSosModal()" title="Спешен сигнал">🚨</button>
        <div class="nav__avatar" id="navAvatar" onclick="openProfile()"></div>
      </div>
    </nav>
  </div>

  <!-- Nav state bootstrap: pre-apply active class + cached avatar BEFORE any JS
       loads, so the nav looks identical during loading and after init. Prevents
       the 'Home button unhighlighted / avatar empty' flash Ventsi reported. -->
  <script>
    (function() {
      try {
        // 1. Active menu item based on current URL hash
        var hash = (location.hash || '#/home').split('?')[0].replace('#/', '').split('/');
        var page = hash[0] || 'home';
        // Home also highlights if hash is empty or explicit
        var selector = '[data-nav="' + page + '"]';
        var link = document.querySelector(selector) || document.querySelector('[data-nav="home"]');
        if (link) link.classList.add('active');
      } catch (e) {}

      try {
        // 2. Pre-populate avatar from localStorage cache (saved by auth.js on login)
        var cached = localStorage.getItem('thepact-user');
        if (cached) {
          var u = JSON.parse(cached);
          var av = document.getElementById('navAvatar');
          if (av && u) {
            if (u.avatar_url) {
              av.innerHTML = '<img src="' + u.avatar_url + '" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;display:block">';
            } else if (u.name) {
              av.textContent = u.name.split(' ').map(function(n){return n[0];}).join('').substring(0,2) || '?';
            }
          }
        }
      } catch (e) {}

      try {
        // 3. Optimistic "live" WS status so the right side isn't empty during load
        var wsDot = document.getElementById('wsStatusDot');
        var wsTxt = document.getElementById('wsStatus');
        if (wsDot) wsDot.className = 'status-dot online';
        if (wsTxt) wsTxt.textContent = 'live';
      } catch (e) {}
    })();
  </script>

  <!-- Main Content -->
  <main class="main-area" id="mainArea">
    <!-- Breadcrumb Bar (inside main-area so it appears below the fixed nav) -->
    <div class="breadcrumb-bar hidden" id="breadcrumbBar">
      <div class="breadcrumb" id="breadcrumb"></div>
    </div>
    <div id="pageContent">
      <div style="text-align:center;padding:60px;color:var(--text-dim)">Зареждане...</div>
    </div>
  </main>

  <!-- Profile Modal -->
  <div id="addColumnModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;justify-content:center;align-items:center;backdrop-filter:blur(4px)" onclick="if(event.target===this)closeAddColumnModal()">
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:32px;width:380px;max-width:90vw;position:relative">
      <button onclick="closeAddColumnModal()" style="position:absolute;top:12px;right:12px;background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer">&times;</button>
      <h2 style="font-size:18px;font-weight:600;color:#fff;margin-bottom:20px">Добави колона</h2>
      <input id="addColumnInput" type="text" style="width:100%;box-sizing:border-box;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;margin-bottom:16px;outline:none" placeholder="Име на колона" onkeydown="if(event.key==='Enter')submitAddColumn();if(event.key==='Escape')closeAddColumnModal()">
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button class="btn btn-ghost btn-sm" onclick="closeAddColumnModal()">Отказ</button>
        <button class="btn btn-sm" onclick="submitAddColumn()">Добави</button>
      </div>
    </div>
  </div>

  <div id="profileModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;justify-content:center;align-items:center;backdrop-filter:blur(4px)">
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:32px;width:420px;max-width:90vw;position:relative">
      <button onclick="closeProfile()" style="position:absolute;top:12px;right:12px;background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer">&times;</button>
      <h2 style="font-size:18px;font-weight:600;color:#fff;margin-bottom:24px">Профил</h2>
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px">
        <div id="profileAvatar" style="width:64px;height:64px;border-radius:50%;background:var(--bg-hover);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:600;color:var(--accent);border:2px solid var(--border);overflow:hidden;cursor:pointer" onclick="document.getElementById('avatarInput').click()"></div>
        <div>
          <div id="profileName" style="font-size:16px;font-weight:600;color:#fff"></div>
          <div id="profileEmail" style="font-size:13px;color:var(--text-dim)"></div>
          <div id="profileRole" style="margin-top:4px"></div>
        </div>
        <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="uploadAvatar(this)">
      </div>
      <div class="divider"></div>
      <div style="margin-top:16px">
        <label style="font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:6px">Име</label>
        <div style="display:flex;gap:8px">
          <input id="profileNameInput" style="flex:1" placeholder="Име и фамилия">
          <button class="btn btn-primary btn-sm" onclick="saveProfileName()">Запази</button>
        </div>
      </div>
      <div class="divider"></div>
      <div style="margin-top:16px">
        <label style="font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:6px">Смяна на парола</label>
        <input id="currentPwd" type="password" placeholder="Текуща парола" style="width:100%;margin-bottom:8px">
        <input id="newPwd" type="password" placeholder="Нова парола" style="width:100%;margin-bottom:8px">
        <button class="btn btn-sm" onclick="changePassword()">Смени парола</button>
        <span id="pwdMsg" style="font-size:12px;margin-left:8px"></span>
      </div>
      <div class="divider"></div>
      <div style="margin-top:16px;text-align:center">
        <button class="btn btn-sm" onclick="logout()" style="color:var(--red)">Изход от акаунта</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="/js/home.js" defer></script>
  <script src="/js/project.js" defer></script>
  <script src="/js/dashboard.js" defer></script>
  <script src="/js/kanban.js" defer></script>
  <script src="/js/card-detail.js" defer></script>
  <script src="/js/card-actions.js" defer></script>
  <script src="/js/card-fields.js" defer></script>
  <script src="/js/card-comments.js" defer></script>
  <script src="/js/chat.js" defer></script>
  <script src="/js/activity.js" defer></script>
  <script src="/js/vault-docs.js" defer></script>
  <script src="/js/schedule.js" defer></script>
  <script src="/js/admin.js" defer></script>
  <script src="/js/reports.js" defer></script>
  <script src="/js/theme-data-core.js" defer></script>
  <script src="/js/theme-data-rest.js" defer></script>
  <script src="/js/theme-admin.js" defer></script>
  <script src="/js/kp-auto.js" defer></script>
  <script src="/js/sos.js" defer></script>
  <script src="/js/prod-calendar.js" defer></script>
  <script src="/js/app-init.js" defer></script>
</body>
</html>
