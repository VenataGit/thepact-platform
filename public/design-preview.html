<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Board Cards Design Preview — ThePact</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b151b; --bg-card: #1b2930; --bg-elevated: #1e3040;
  --bg-hover: #243848; --border: #1e3040; --border-hover: #2c4858;
  --text: #e8ecee; --text-secondary: #8fa3b0; --text-dim: #566d7a;
  --accent: #1cb0f6; --green: #22c55e; --red: #ef4444;
  color-scheme: dark;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
.picker-bar {
  position: sticky; top: 0; z-index: 100; background: #0d1a22;
  border-bottom: 1px solid var(--border); padding: 14px 24px;
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.picker-bar__title { font-size: 14px; font-weight: 700; color: #fff; margin-right: 10px; }
.style-btn {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 14px; color: var(--text-secondary); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; font-family: inherit;
}
.style-btn:hover { border-color: var(--accent); color: var(--accent); }
.style-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.style-desc { flex-basis: 100%; margin-top: 8px; font-size: 12px; color: var(--text-dim); line-height: 1.6; }
.preview-wrap { max-width: 1100px; margin: 30px auto; padding: 0 24px; }
.preview-section { background: var(--bg-card); border-radius: 12px; padding: 28px 32px 36px; }
.section-label { font-size: 12px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 14px; }
.bg { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }

/* ============================================
   1 — DIAGONAL SLICE
   Диагонална линия разделя цветна и тъмна зона
   ============================================ */
.v1 .c {
  position: relative; display: flex; flex-direction: column; justify-content: flex-end;
  background: var(--bg-card); border-radius: 14px; padding: 18px; min-height: 120px;
  cursor: pointer; transition: all 0.2s; overflow: hidden; box-shadow: 0 2px 10px rgba(0,0,0,.25);
}
.v1 .c::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 55%;
  background: rgba(28,176,246,0.1); clip-path: polygon(0 0, 100% 0, 100% 60%, 0 100%);
}
.v1 .c:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(0,0,0,.4); }
.v1 .c__t { font-size: 14px; font-weight: 800; color: #fff; margin-bottom: 4px; position: relative; }
.v1 .c__s { font-size: 11px; color: var(--text-dim); position: relative; }
.v1 .c__b { position: absolute; top: 12px; right: 14px; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; background: rgba(239,68,68,.2); color: var(--red); z-index: 1; }
.v1 .c--n { opacity: 0.35; border: 1px dashed var(--border); box-shadow: none; }
.v1 .c--n::before { display: none; }

/* ============================================
   2 — MONOLITH
   Плътен блок, без рамка, голям bold шрифт
   ============================================ */
.v2 .c {
  display: flex; flex-direction: column; justify-content: flex-end;
  background: var(--bg-elevated); border-radius: 10px; padding: 22px 20px;
  min-height: 125px; cursor: pointer; transition: all 0.15s;
}
.v2 .c:hover { background: var(--bg-hover); }
.v2 .c__t { font-size: 18px; font-weight: 900; color: #fff; margin-bottom: 6px; line-height: 1.1; }
.v2 .c__s { font-size: 11px; color: var(--text-dim); font-weight: 500; }
.v2 .c__b { margin-top: 8px; display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 6px; background: rgba(239,68,68,.12); color: var(--red); }
.v2 .c--n { opacity: 0.3; border: 1px dashed var(--border); }

/* ============================================
   3 — PROGRESS METER
   Мини progress bar показва запълненост
   ============================================ */
.v3 .c {
  display: flex; flex-direction: column;
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
  padding: 16px 18px 14px; min-height: 110px; cursor: pointer; transition: all 0.15s;
}
.v3 .c:hover { border-color: var(--border-hover); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.3); }
.v3 .c__t { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.v3 .c__s { font-size: 11px; color: var(--text-dim); margin-bottom: auto; }
.v3 .c__bar { height: 4px; border-radius: 2px; background: rgba(255,255,255,.06); margin-top: 14px; overflow: hidden; }
.v3 .c__bar-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width 0.3s; }
.v3 .c__b { position: absolute; top: 12px; right: 14px; font-size: 10px; font-weight: 700; color: var(--red); }
.v3 .c { position: relative; }
.v3 .c--n { opacity: 0.35; border-style: dashed; }
.v3 .c--n .c__bar { display: none; }

/* ============================================
   4 — FLOATING ISLAND
   Голям shadow, закръглени ъгли, "плава"
   ============================================ */
.v4 .c {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: var(--bg-card); border: none; border-radius: 24px;
  padding: 24px 20px; min-height: 130px; text-align: center;
  cursor: pointer; transition: all 0.3s;
  box-shadow: 0 6px 24px rgba(0,0,0,.3), 0 1px 3px rgba(0,0,0,.2);
}
.v4 .c:hover { transform: translateY(-6px); box-shadow: 0 16px 48px rgba(0,0,0,.4), 0 2px 6px rgba(0,0,0,.2); }
.v4 .c__t { font-size: 14px; font-weight: 800; color: #fff; margin-bottom: 8px; }
.v4 .c__s { font-size: 11px; color: var(--text-dim); }
.v4 .c__b { margin-top: 10px; font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 12px; background: rgba(239,68,68,.15); color: #fca5a5; }
.v4 .c--n { opacity: 0.3; border: 1px dashed var(--border); box-shadow: none; }

/* ============================================
   5 — SIDE STRIPE + NUMBERS
   Вертикална ивица вляво, голям count вдясно
   ============================================ */
.v5 .c {
  display: flex; align-items: center; gap: 14px;
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
  border-left: 4px solid var(--accent); padding: 16px 18px; min-height: 90px;
  cursor: pointer; transition: all 0.15s;
}
.v5 .c:hover { background: var(--bg-hover); transform: translateX(3px); }
.v5 .c__info { flex: 1; }
.v5 .c__t { font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 3px; }
.v5 .c__s { font-size: 10px; color: var(--text-dim); }
.v5 .c__big { font-size: 32px; font-weight: 900; color: rgba(28,176,246,.2); line-height: 1; }
.v5 .c__b { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 8px; background: rgba(239,68,68,.12); color: var(--red); }
.v5 .c--n { border-left-style: dashed; border-left-color: var(--border); opacity: 0.3; }

/* ============================================
   6 — DOUBLE BORDER
   Двойна рамка — вътрешна + външна
   ============================================ */
.v6 .c {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: var(--bg-card); border: 2px solid var(--border); border-radius: 12px;
  padding: 4px; min-height: 120px; cursor: pointer; transition: all 0.2s; text-align: center;
}
.v6 .c:hover { border-color: rgba(28,176,246,.3); }
.v6 .c__inner {
  width: 100%; height: 100%; border: 1px solid var(--border); border-radius: 8px;
  padding: 18px 16px; display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: border-color 0.2s;
}
.v6 .c:hover .c__inner { border-color: rgba(28,176,246,.15); }
.v6 .c__t { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 6px; }
.v6 .c__s { font-size: 11px; color: var(--text-dim); }
.v6 .c__b { margin-top: 8px; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 8px; background: rgba(239,68,68,.15); color: var(--red); }
.v6 .c--n { border-style: dashed; opacity: 0.3; }
.v6 .c--n .c__inner { border-style: dashed; }

/* ============================================
   7 — SPOTLIGHT
   Кръгъл accent елемент + centered text
   ============================================ */
.v7 .c {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px;
  padding: 22px 18px; min-height: 130px; text-align: center;
  cursor: pointer; transition: all 0.2s; position: relative;
}
.v7 .c:hover { border-color: var(--border-hover); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.3); }
.v7 .c__ring {
  width: 44px; height: 44px; border-radius: 50%; margin-bottom: 14px;
  background: rgba(28,176,246,.08); border: 2px solid rgba(28,176,246,.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 900; color: rgba(28,176,246,.6); transition: all 0.2s;
}
.v7 .c:hover .c__ring { background: rgba(28,176,246,.15); border-color: rgba(28,176,246,.4); }
.v7 .c__t { font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.v7 .c__s { font-size: 10px; color: var(--text-dim); }
.v7 .c__b { position: absolute; top: 10px; right: 12px; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; background: rgba(239,68,68,.15); color: var(--red); }
.v7 .c--n { opacity: 0.3; border-style: dashed; }
.v7 .c--n .c__ring { border-color: var(--text-dim); background: transparent; }

/* ============================================
   8 — RIBBON TAB
   "Етикет" tab в горния ляв ъгъл
   ============================================ */
.v8 .c {
  display: flex; flex-direction: column; justify-content: flex-end;
  background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 12px;
  padding: 40px 18px 16px; min-height: 115px; cursor: pointer;
  transition: all 0.15s; position: relative; overflow: hidden;
}
.v8 .c:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.3); border-color: var(--border-hover); }
.v8 .c__tab {
  position: absolute; top: 0; left: 0;
  background: rgba(28,176,246,.15); padding: 6px 14px 6px 12px;
  border-radius: 0 0 12px 0; font-size: 10px; font-weight: 700;
  color: var(--accent); text-transform: uppercase; letter-spacing: 0.06em;
}
.v8 .c__t { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.v8 .c__s { font-size: 11px; color: var(--text-dim); }
.v8 .c__b { position: absolute; top: 8px; right: 12px; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 8px; background: rgba(239,68,68,.12); color: var(--red); }
.v8 .c--n { border-style: dashed; opacity: 0.3; }
.v8 .c--n .c__tab { display: none; }

/* ============================================
   9 — METRO TILE
   Плоски плочки, accent фон, бели букви
   ============================================ */
.v9 .c {
  display: flex; flex-direction: column; justify-content: flex-end;
  background: rgba(28,176,246,.12); border: none; border-radius: 6px;
  padding: 18px; min-height: 115px; cursor: pointer; transition: all 0.1s;
}
.v9 .c:hover { background: rgba(28,176,246,.2); }
.v9 .c__t { font-size: 15px; font-weight: 800; color: #fff; margin-bottom: 4px; }
.v9 .c__s { font-size: 11px; color: rgba(255,255,255,.4); }
.v9 .c__b { margin-top: 8px; display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; background: rgba(239,68,68,.3); color: #fca5a5; }
.v9 .c--n { opacity: 0.25; border: 1px dashed rgba(28,176,246,.2); background: transparent; }

/* ============================================
   10 — UNDERLINE
   Чист текст, само долна черта accent при hover
   ============================================ */
.v10 .bg { gap: 8px; }
.v10 .c {
  display: flex; flex-direction: column; justify-content: center;
  background: transparent; border: none; border-bottom: 2px solid transparent;
  border-radius: 0; padding: 18px 14px; min-height: 90px;
  cursor: pointer; transition: all 0.2s;
}
.v10 .c:hover { border-bottom-color: var(--accent); background: rgba(28,176,246,.03); }
.v10 .c__t { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.v10 .c__s { font-size: 11px; color: var(--text-dim); }
.v10 .c__b { margin-top: 6px; display: inline-block; font-size: 10px; font-weight: 700; color: var(--red); }
.v10 .c--n { opacity: 0.25; }
</style>
</head>
<body>

<div class="picker-bar">
  <span class="picker-bar__title">Нови варианти:</span>
  <button class="style-btn" data-v="1">1 — Diagonal</button>
  <button class="style-btn" data-v="2">2 — Monolith</button>
  <button class="style-btn" data-v="3">3 — Progress</button>
  <button class="style-btn" data-v="4">4 — Island</button>
  <button class="style-btn" data-v="5">5 — Side Stripe</button>
  <button class="style-btn" data-v="6">6 — Double Border</button>
  <button class="style-btn" data-v="7">7 — Spotlight</button>
  <button class="style-btn" data-v="8">8 — Ribbon Tab</button>
  <button class="style-btn" data-v="9">9 — Metro Tile</button>
  <button class="style-btn" data-v="10">10 — Underline</button>
  <div class="style-desc" id="styleDesc"></div>
</div>

<div class="preview-wrap">
  <div class="preview-section">
    <div class="section-label">Проекти</div>
    <div id="boardGrid"></div>
  </div>
</div>

<script>
var D = {
  '1': 'Diagonal Slice — диагонална цветна зона в горната половина. Заглавие и детайли отдолу.',
  '2': 'Monolith — плътен блок без рамка, голям bold шрифт (18px). Тежък и солиден.',
  '3': 'Progress Meter — мини progress bar отдолу показва колко карти има (по-пълен = повече).',
  '4': 'Floating Island — много закръглени ъгли (24px), голям shadow, "плава" при hover.',
  '5': 'Side Stripe — лява accent ивица, голям номер вдясно. Layout е grid 4 колони.',
  '6': 'Double Border — двойна рамка (вътрешна + външна), и двете светват при hover.',
  '7': 'Spotlight — кръгъл accent елемент с числото на картите, центриран layout.',
  '8': 'Ribbon Tab — малък "етикет" в горния ляв ъгъл с номера, текст отдолу.',
  '9': 'Metro Tile — плоски цветни плочки (accent фон), без рамки, Windows Metro стил.',
  '10': 'Underline — минимален, без фон/рамка, само долна accent линия при hover.'
};

var B = [
  { t: 'Pre-Production', c: 4, cols: 3, o: 1 },
  { t: 'Production',     c: 12, cols: 3, o: 3 },
  { t: 'Post-Production', c: 2, cols: 4, o: 0 },
  { t: 'Акаунт Мениджмънт', c: 0, cols: 3, o: 0 },
  { t: 'Задачи', c: 0, cols: 2, o: 0 },
];

function bd(b) { return b.o > 0 ? '<span class="c__b">\u26a0 '+b.o+'</span>' : ''; }

function render(v) {
  var maxCards = 12;
  var html = '<div class="bg v' + v + '">';
  B.forEach(function(b) {
    if (v==='3') {
      var pct = Math.min(100, Math.round(b.c/maxCards*100));
      html += '<div class="c"><div class="c__t">'+b.t+'</div><div class="c__s">'+b.c+' карти \xb7 '+b.cols+' колони</div><div class="c__bar"><div class="c__bar-fill" style="width:'+pct+'%"></div></div>'+bd(b)+'</div>';
    } else if (v==='5') {
      html += '<div class="c"><div class="c__info"><div class="c__t">'+b.t+'</div><div class="c__s">'+b.c+' карти \xb7 '+b.cols+' колони</div></div>'+(b.o>0?bd(b):'')+' <div class="c__big">'+b.c+'</div></div>';
    } else if (v==='6') {
      html += '<div class="c"><div class="c__inner"><div class="c__t">'+b.t+'</div><div class="c__s">'+b.c+' карти \xb7 '+b.cols+' колони</div>'+bd(b)+'</div></div>';
    } else if (v==='7') {
      html += '<div class="c"><div class="c__ring">'+b.c+'</div><div class="c__t">'+b.t+'</div><div class="c__s">'+b.cols+' колони</div>'+bd(b)+'</div>';
    } else if (v==='8') {
      html += '<div class="c"><div class="c__tab">'+b.c+' карти</div><div class="c__t">'+b.t+'</div><div class="c__s">'+b.cols+' колони</div>'+bd(b)+'</div>';
    } else {
      html += '<div class="c"><div class="c__t">'+b.t+'</div><div class="c__s">'+b.c+' карти \xb7 '+b.cols+' колони</div>'+bd(b)+'</div>';
    }
  });
  // + Нов борд
  if (v==='6') html += '<div class="c c--n"><div class="c__inner"><div class="c__t" style="font-size:14px">+ Нов борд</div></div></div>';
  else if (v==='7') html += '<div class="c c--n"><div class="c__ring">+</div><div class="c__t" style="font-size:13px">Нов борд</div></div>';
  else if (v==='8') html += '<div class="c c--n"><div class="c__t" style="font-size:14px">+ Нов борд</div></div>';
  else html += '<div class="c c--n"><div class="c__t" style="font-size:14px">+ Нов борд</div></div>';
  html += '</div>';
  return html;
}

function set(v) {
  document.getElementById('boardGrid').innerHTML = render(v);
  document.getElementById('styleDesc').textContent = D[v];
  document.querySelectorAll('.style-btn').forEach(function(btn) { btn.classList.toggle('active', btn.dataset.v===v); });
}
document.querySelectorAll('.style-btn').forEach(function(btn) { btn.addEventListener('click', function(){ set(btn.dataset.v); }); });
set('1');
</script>
</body>
</html>
