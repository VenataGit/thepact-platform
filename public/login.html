<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Pact — Вход</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .login-card { background: #111; border: 1px solid #222; border-radius: 16px; padding: 48px 40px; width: 360px; text-align: center; }
    .logo { font-size: 24px; font-weight: 700; color: var(--accent, #9B7D44); margin-bottom: 8px; }
    .subtitle { color: #666; font-size: 13px; margin-bottom: 32px; }
    .form-group { margin-bottom: 16px; text-align: left; }
    .form-group label { display: block; font-size: 12px; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
    .form-group input { width: 100%; padding: 12px 14px; background: #0a0a0a; border: 1px solid #333; border-radius: 8px; color: #e0e0e0; font-size: 14px; outline: none; transition: border-color 0.2s; }
    .form-group input:focus { border-color: var(--accent, #9B7D44); }
    .btn-login { width: 100%; padding: 12px; background: var(--accent, #9B7D44); color: #000; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: opacity 0.2s; }
    .btn-login:hover { opacity: 0.9; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
    .error { color: #ff4444; font-size: 13px; margin-top: 12px; display: none; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">The Pact</div>
    <div class="subtitle">Production Dashboard</div>
    <form id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required autocomplete="email" autofocus>
      </div>
      <div class="form-group">
        <label>Парола</label>
        <input type="password" id="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="loginBtn">Влез</button>
      <div class="error" id="loginError"></div>
    </form>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('loginError');
      btn.disabled = true;
      err.style.display = 'none';
      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (res.ok && data.ok) {
          localStorage.setItem('pact_user', JSON.stringify(data.user));
          window.location.href = '/';
        } else {
          err.textContent = data.error || 'Грешка при вход';
          err.style.display = 'block';
        }
      } catch {
        err.textContent = 'Няма връзка със сървъра';
        err.style.display = 'block';
      }
      btn.disabled = false;
    });
  </script>
</body>
</html>
