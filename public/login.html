<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a2730">
  <meta name="color-scheme" content="dark">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/img/icon-192.png">
  <title>The Pact</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a2730;
      color: #e8ecee;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .login-wrapper { position: relative; width: 380px; }
    /* Subtle glow behind card */
    .login-wrapper::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(28, 176, 246, 0.08) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    .login-card {
      position: relative;
      background: #1e2f3a;
      border: 1px solid #2a3f4d;
      border-radius: 16px;
      padding: 40px 36px;
    }
    .logo-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; justify-content: center; }
    .subtitle { color: #566d7a; font-size: 13px; margin-bottom: 32px; text-align: center; }
    .btn-basecamp {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 13px;
      background: #1cb0f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s, transform 0.15s;
      touch-action: manipulation;
    }
    .btn-basecamp:hover { background: #3dc0ff; }
    .btn-basecamp:active { transform: scale(0.98); }
    .bc-hint { text-align: center; color: #566d7a; font-size: 12px; margin-top: 12px; }
    .error { color: #ef4444; font-size: 13px; margin-top: 16px; text-align: center; display: none; }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="logo-row">
        <img src="/img/logo-white.svg" alt="The Pact" style="height:38px">
      </div>
      <div class="subtitle">Продукционен дашборд</div>

      <a class="btn-basecamp" href="/auth/basecamp">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="9" stroke="#fff" stroke-width="2"/>
          <path d="M9 12l2 2 4-4" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Влез с Basecamp
      </a>
      <div class="bc-hint">Свържи се с акаунта си в Basecamp</div>

      <div class="error" id="loginError"></div>
    </div>
  </div>
  <script>
    // Surface a Basecamp login error if the callback bounced us back with ?bc=
    (function () {
      const bc = new URLSearchParams(location.search).get('bc');
      if (!bc) return;
      const msgs = {
        denied: 'Отказахте достъпа до Basecamp.',
        notteam: 'Нямаш достъп — трябва да си в екипа на The Pact или в проекта Video Production в Basecamp.',
        state: 'Сесията изтече. Опитай отново.',
        identity: 'Не успяхме да прочетем данните ти от Basecamp.',
        inactive: 'Акаунтът ти е деактивиран. Свържи се с админ.',
        nocode: 'Връзката с Basecamp прекъсна. Опитай отново.',
        error: 'Грешка при свързване с Basecamp. Опитай отново.'
      };
      const err = document.getElementById('loginError');
      err.textContent = msgs[bc] || 'Грешка при вход с Basecamp.';
      err.style.display = 'block';
    })();
  </script>
</body>
</html>
