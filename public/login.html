<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a2730">
  <meta name="color-scheme" content="dark">
  <title>The Pact</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a2730;
      color: #e8ecee;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .login-wrapper {
      position: relative;
      width: 380px;
    }
    /* Subtle glow behind card */
    .login-wrapper::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(28, 176, 246, 0.08) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    .login-card {
      position: relative;
      background: #1e2f3a;
      border: 1px solid #2a3f4d;
      border-radius: 16px;
      padding: 40px 36px;
    }
    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .logo-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #1cb0f6;
    }
    .logo-text {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
    }
    .subtitle {
      color: #566d7a;
      font-size: 13px;
      margin-bottom: 32px;
      padding-left: 20px;
    }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #8fa3b0;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .form-group input {
      width: 100%;
      padding: 11px 14px;
      background: #1a2730;
      border: 1px solid #2a3f4d;
      border-radius: 8px;
      color: #e8ecee;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus {
      border-color: #1cb0f6;
      box-shadow: 0 0 0 3px rgba(28, 176, 246, 0.15);
    }
    .form-group input::placeholder { color: #52525b; }
    .btn-login {
      width: 100%;
      padding: 11px;
      background: #1cb0f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.15s, transform 0.15s;
      touch-action: manipulation;
    }
    .btn-login:hover { background: #3dc0ff; }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
    .error {
      color: #ef4444;
      font-size: 13px;
      margin-top: 14px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="logo-row">
        <div class="logo-dot"></div>
        <div class="logo-text">The Pact</div>
      </div>
      <div class="subtitle">Продукционен дашборд</div>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email" autofocus placeholder="you@thepact.bg">
        </div>
        <div class="form-group">
          <label for="password">Парола</label>
          <input type="password" id="password" required autocomplete="current-password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;">
        </div>
        <button type="submit" class="btn-login" id="loginBtn">Влез</button>
        <div class="error" id="loginError"></div>
      </form>
    </div>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('loginError');
      btn.disabled = true;
      err.style.display = 'none';
      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (res.ok && data.ok) {
          localStorage.setItem('pact_user', JSON.stringify(data.user));
          window.location.href = '/';
        } else {
          err.textContent = data.error || 'Грешка при вход';
          err.style.display = 'block';
        }
      } catch {
        err.textContent = 'Няма връзка със сървъра';
        err.style.display = 'block';
      }
      btn.disabled = false;
    });
  </script>
</body>
</html>
